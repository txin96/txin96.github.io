<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/company.css">
  <script src="company-info.js"></script>
  <script src="js/mobile-menu.js"></script>
</head>

<body>
  <header>
    <div class="container header-inner">
      <div>
        <div class="logo-main" data-company="name"></div>
        <div class="logo-sub" data-company="tagline"></div>
      </div>
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav><a href="index.html">Top</a><a href="about.html">About Us</a><a href="business.html">Business</a><a
          href="news.html">News</a><a href="company.html" class="active">Company</a><a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="eyebrow">Company</div>
        <h1>会社概要</h1>
        <div class="lead">企業情報、所在地、事業内容、体制などの基本情報を掲載しています。</div>
      </div>
    </section>
    <section>
      <div class="container">
        <div class="table">
          <div class="row">
            <div class="th">会社名</div>
            <div class="td"><span data-company="name"></span>株式会社</div>
          </div>
          <div class="row">
            <div class="th">設立</div>
            <div class="td">2026年</div>
          </div>
          <div class="row">
            <div class="th">所在地</div>
            <div class="td">東京都内</div>
          </div>
          <div class="row">
            <div class="th">事業内容</div>
            <div class="td">ERP導入支援、業務システム開発、クラウド構築、インフラ設計・運用支援</div>
          </div>
          <div class="row">
            <div class="th">代表</div>
            <div class="td">Your Name</div>
          </div>
          <div class="row">
            <div class="th">お問い合わせ</div>
            <div class="td" data-company="contact.email"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-inner">
      <div data-company="footer.copyright"></div>
      <div data-company="footer.details"></div>
    </div>
  </footer>
</body>

</html>
