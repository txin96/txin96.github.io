<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="company-info.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof COMPANY_INFO !== 'undefined') {
        document.title = COMPANY_INFO.name + ' | Contact';
      }
    });
  </script>
  <style>
    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #1e293b;
      line-height: 1.7;
      background: #fff
    }

    a {
      text-decoration: none;
      color: inherit
    }

    .container {
      width: min(1140px, calc(100% - 40px));
      margin: 0 auto
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
      z-index: 10
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      gap: 20px
    }

    .logo-main {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: .2em;
      color: #0f172a
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: .35em;
      color: #64748b;
      margin-top: 4px
    }

    nav {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      font-size: 14px;
      color: #475569
    }

    nav a.active,
    nav a:hover {
      color: #0369a1
    }

    .page-hero {
      padding: 100px 0 70px;
      background: linear-gradient(135deg, #eff6ff, #f8fafc)
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: .35em;
      color: #0369a1;
      text-transform: uppercase
    }

    .page-hero h1 {
      margin: 14px 0 0;
      font-size: clamp(34px, 5vw, 58px);
      color: #0f172a
    }

    .lead {
      max-width: 760px;
      color: #475569;
      font-size: 18px;
      margin-top: 18px
    }

    section {
      padding: 80px 0
    }

    .panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .04)
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px
    }

    .item {
      padding: 22px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0
    }

    .item h3 {
      margin: 0 0 10px;
      color: #0f172a
    }

    .muted {
      color: #64748b
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      border-radius: 999px;
      background: #0284c7;
      color: #fff;
      font-weight: 600
    }

    .btn:hover {
      background: #0369a1
    }

    footer {
      background: #0f172a;
      color: #cbd5e1;
      padding: 34px 0;
      margin-top: 60px
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 14px
    }

    @media (max-width:900px) {

      .header-inner,
      .contact-grid {
        display: flex;
        flex-direction: column;
        align-items: flex-start
      }
    }

    /* Mobile support patch */
    @media (max-width: 900px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      nav {
        gap: 16px;
        row-gap: 10px;
        justify-content: flex-start;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .grid,
      .about-grid,
      .cards,
      .contact-grid {
        grid-template-columns: 1fr !important;
      }

      .row {
        grid-template-columns: 1fr !important;
      }

      .th {
        padding-bottom: 8px;
      }

      .td {
        padding-top: 0;
      }
    }

    @media (max-width: 720px) {
      .container {
        width: min(1140px, calc(100% - 32px));
      }

      section {
        padding: 64px 0 !important;
      }

      .page-hero,
      .hero-content {
        padding: 76px 0 56px !important;
      }

      .page-hero h1,
      .hero h1 {
        font-size: clamp(30px, 8vw, 44px) !important;
        line-height: 1.2;
      }

      .lead,
      .hero p,
      .greeting,
      .about-text p,
      .card-body p,
      .news-text,
      .desc,
      .td,
      .muted {
        font-size: 15px !important;
      }

      .hero-buttons,
      .cta>div,
      .contact-grid+a,
      .cta .btn-primary,
      .cta .btn-secondary {
        width: 100%;
      }

      .hero-buttons {
        gap: 12px;
      }

      .btn {
        padding: 12px 22px;
        font-size: 13px;
      }

      .news-item {
        grid-template-columns: 1fr !important;
        gap: 8px;
      }

      .card-image,
      .about-image,
      .photo {
        min-height: 240px;
        height: 240px;
      }

      .panel,
      .news-item,
      .item,
      .card-body,
      .th,
      .td {
        padding-left: 18px !important;
        padding-right: 18px !important;
      }

      .logo-main {
        font-size: 26px;
      }

      .logo-sub {
        letter-spacing: 0.25em;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="container header-inner">
      <div>
        <div class="logo-main" data-company="name"></div>
        <div class="logo-sub" data-company="tagline"></div>
      </div>
      <nav><a href="index.html">Top</a><a href="about.html">About Us</a><a href="business.html">Business</a><a
          href="news.html">News</a><a href="company.html">Company</a><a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="eyebrow">Contact</div>
        <h1>お問い合わせ</h1>
        <div class="lead">システム導入や開発体制、クラウド移行、インフラ整備など、お気軽にご相談ください。</div>
      </div>
    </section>
    <section>
      <div class="container">
        <div class="panel">
          <div class="contact-grid">
            <div class="item">
              <h3>Email</h3>
              <div class="muted" data-company="contact.email"></div>
            </div>
            <div class="item">
              <h3>Business Hour</h3>
              <div class="muted">平日 9:00 - 18:00</div>
            </div>
            <div class="item">
              <h3>Location</h3>
              <div class="muted">東京都内</div>
            </div>
            <div class="item">
              <h3>Consultation</h3>
              <div class="muted">ERP / システム開発 / クラウド / インフラ</div>
            </div>
          </div><a class="btn" href="mailto:" data-company="contact.email">メールで問い合わせる</a>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-inner">
      <div data-company="footer.copyright"></div>
      <div data-company="footer.details"></div>
    </div>
  </footer>
</body>

</html>
